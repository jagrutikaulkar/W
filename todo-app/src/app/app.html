<div class="container">
  <h1>To-Do List</h1>

  <div class="input-box">
    <input
      type="text"
      placeholder="Enter task"
      [(ngModel)]="task"
    />

    <input
      type="time"
      [(ngModel)]="time"
    />

    <button (click)="addTask()">
      {{ editIndex === null ? 'Add Task' : 'Update Task' }}
    </button>
  </div>

  <ul>
    <li *ngFor="let t of tasks; let i = index">
      <span>{{ t.task }} - {{ t.time }}</span>

      <div>
        <button class="edit" (click)="editTask(i)">Edit</button>
        <button class="delete" (click)="deleteTask(i)">Delete</button>
      </div>
    </li>
  </ul>
</div>
