<!DOCTYPE html>
<html>
<head>
  <title>Auth System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- REGISTER -->
  <form id="registerForm" onsubmit="registerUser(event)">
    <h2>Register</h2>

    <input id="name" type="text" placeholder="Full Name" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="mobile" type="tel" placeholder="Mobile (10 digits)" pattern="[0-9]{10}" required>
    <input id="dob" type="date" required>
    <input id="city" type="text" placeholder="City" required>
    <textarea id="address" placeholder="Address" required></textarea>

    <input id="username" type="text" placeholder="Username" required>
    <input id="password" type="password" placeholder="Password (min 6)" minlength="6" required>

    <button type="submit">Register</button>

    <p class="switch" onclick="showLogin()">Already have account? Login</p>
  </form>

  <!-- LOGIN -->
  <form id="loginForm" style="display:none" onsubmit="loginUser(event)">
    <h2>Login</h2>

    <input id="loginUsername" type="text" placeholder="Username" required>
    <input id="loginPassword" type="password" placeholder="Password" required>

    <button type="submit">Login</button>

    <p class="switch" onclick="showRegister()">New user? Register</p>
  </form>

</div>

<script src="script.js"></script>
</body>
</html>
