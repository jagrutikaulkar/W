<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>To-Do List</h1>

  <div class="input-box">

    <input type="text" id="task" placeholder="Enter task">
    <input type="time" id="time">

    <button onclick="addTask()">
      Add Task
    </button>

  </div>

  <ul id="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
