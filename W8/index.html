<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.form-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-lg-6 col-md-8">
<div class="form-box">

<h2 class="text-center mb-4">Event Registration Form</h2>

<form class="needs-validation" novalidate>

<div class="form-floating mb-3">
<input type="text" class="form-control" id="name" placeholder="Full Name" required>
<label for="name">Full Name</label>
<div class="invalid-feedback">Please enter your name.</div>
</div>

<div class="form-floating mb-3">
<input type="email" class="form-control" id="email" placeholder="Email" required>
<label for="email">Email Address</label>
<div class="invalid-feedback">Please enter a valid email.</div>
</div>

<div class="form-floating mb-3">
<input type="tel" class="form-control" id="phone" placeholder="Phone Number" required pattern="[0-9]{10}">
<label for="phone">Phone Number</label>
<div class="invalid-feedback">Please enter 10 digit phone number.</div>
</div>

<div class="form-floating mb-3">
<select class="form-select" id="event" required>
<option value="">Select Event</option>
<option>Technical Quiz</option>
<option>Coding Competition</option>
<option>Project Exhibition</option>
<option>Workshop</option>
</select>
<label for="event">Choose Event</label>
<div class="invalid-feedback">Please select an event.</div>
</div>

<div class="mb-3">
<label class="form-label">Year</label><br>

<input type="radio" class="btn-check" name="year" id="fe" required>
<label class="btn btn-outline-primary" for="fe">FE</label>

<input type="radio" class="btn-check" name="year" id="se">
<label class="btn btn-outline-primary" for="se">SE</label>

<input type="radio" class="btn-check" name="year" id="te">
<label class="btn btn-outline-primary" for="te">TE</label>

<input type="radio" class="btn-check" name="year" id="be">
<label class="btn btn-outline-primary" for="be">BE</label>

</div>

<div class="form-floating mb-3">
<textarea class="form-control" id="message" placeholder="Message" style="height:100px"></textarea>
<label for="message">Message / Query</label>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-success"
data-bs-toggle="tooltip"
data-bs-title="Click to submit registration form">
Register
</button>
</div>

</form>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let form = document.querySelector(".needs-validation");

form.addEventListener("submit", function(event) {

if (!form.checkValidity()) {
event.preventDefault();
event.stopPropagation();
}

form.classList.add("was-validated");

});

let tooltipList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

tooltipList.forEach(function(tooltip) {
new bootstrap.Tooltip(tooltip);
});

</script>

</body>
</html>
